name: Refresh Data

on:
  workflow_dispatch:
    inputs:
      source_set:
        description: "Which published dataset(s) to refresh"
        required: true
        default: "nba_api"
        type: choice
        options:
          - nba_api
          - basketball_reference
          - all
      mode:
        description: "Refresh mode"
        required: true
        default: "rebuild-dataset"
        type: choice
        options:
          - rebuild-dataset
          - force-refresh
      skip_plot:
        description: "Skip regenerating static PNGs"
        required: true
        default: false
        type: boolean

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        if: ${{ inputs.source_set == 'basketball_reference' || inputs.source_set == 'all' }}
        run: python -m playwright install --with-deps chromium

      - name: Refresh selected dataset(s)
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.source_set }}" == "all" ]]; then
            sources=(nba_api basketball_reference)
          else
            sources=("${{ inputs.source_set }}")
          fi

          args=(--mode "${{ inputs.mode }}" --keep-last 2)
          if [[ "${{ inputs.skip_plot }}" == "true" ]]; then
            args+=(--skip-plot)
          fi

          python scripts/refresh_data.py --sources "${sources[@]}" "${args[@]}"

      - name: Commit refreshed data
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backups outputs
          if git diff --cached --quiet; then
            echo "No dataset changes to commit."
            exit 0
          fi
          git commit -m "Refresh published datasets (${{ inputs.source_set }})"
          git push
